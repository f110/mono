name: gocacheprog-verify

on:
  workflow_dispatch:
    inputs:
      gcs_prefix:
        description: "GCS object prefix (used to isolate runs for averaging)"
        required: false
        type: string
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Install gobuildcache
        run: |
          go install github.com/richardartoul/gobuildcache@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: go build ./...
        env:
          GOCACHEPROG: gobuildcache
          GOBUILDCACHE_BACKEND_TYPE: gcs
          GOBUILDCACHE_GCS_BUCKET: gocacheprog-benchmark-test
          GOBUILDCACHE_GCS_PREFIX: ${{ inputs.gcs_prefix }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
        run: go build ./go/cmd/...
