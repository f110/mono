name: go-archive-cacheprog-verify

on:
  workflow_dispatch:
    inputs:
      compression:
        description: "Archive compression method"
        required: true
        type: choice
        default: deflate
        options:
          - deflate
          - zstd
          - store

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Install go-archive-cacheprog
        run: |
          go install go.f110.dev/go-archive-cacheprog@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - uses: actions/cache@v4
        with:
          path: /tmp/go-archive-cache.zip
          key: go-archive-cacheprog-${{ inputs.compression }}

      - name: go build ./go/cmd/...
        env:
          GOCACHEPROG: go-archive-cacheprog
          GO_ARCHIVE_CACHE_FILE: /tmp/go-archive-cache.zip
          GO_ARCHIVE_CACHE_COMPRESSION: ${{ inputs.compression }}
        run: go build ./go/cmd/...
