name: gocache-tmpfs-verify

on:
  workflow_dispatch:
    inputs:
      tmpfs:
        description: "Place GOCACHE on /dev/shm (tmpfs). false = on disk."
        required: true
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Configure GOCACHE
        id: cfg
        run: |
          if [ "${{ inputs.tmpfs }}" = "true" ]; then
            echo "gocache=/dev/shm/go-build" >> "$GITHUB_OUTPUT"
            echo "key=gocache-tmpfs" >> "$GITHUB_OUTPUT"
          else
            echo "gocache=$HOME/go-build" >> "$GITHUB_OUTPUT"
            echo "key=gocache-disk" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare GOCACHE
        run: mkdir -p "${{ steps.cfg.outputs.gocache }}"

      - uses: actions/cache@v4
        with:
          path: ${{ steps.cfg.outputs.gocache }}
          key: ${{ steps.cfg.outputs.key }}

      - name: go build ./go/cmd/...
        env:
          GOCACHE: ${{ steps.cfg.outputs.gocache }}
        run: go build ./go/cmd/...
