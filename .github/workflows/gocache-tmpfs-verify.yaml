name: gocache-tmpfs-verify

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Prepare GOCACHE on tmpfs
        run: mkdir -p /dev/shm/go-build

      - uses: actions/cache@v4
        with:
          path: /dev/shm/go-build
          key: gocache-tmpfs

      - name: go build ./go/cmd/...
        env:
          GOCACHE: /dev/shm/go-build
        run: go build ./go/cmd/...
