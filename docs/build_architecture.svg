<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 780" font-family="-apple-system, 'Helvetica Neue', 'Hiragino Sans', Meiryo, sans-serif" font-size="14">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
  </defs>

  <style>
    .pod   { fill:#eef4fb; stroke:#5b87c4; stroke-width:1.5; rx:8; }
    .ext   { fill:#fff4e6; stroke:#e0922f; stroke-width:1.5; rx:8; }
    .sub   { fill:#ffffff; stroke:#7a93b5; stroke-width:1; rx:6; }
    .job   { fill:#eafaf0; stroke:#3aa564; stroke-width:1.5; rx:8; }
    .store { fill:#f3eefa; stroke:#8b62c4; stroke-width:1.5; rx:8; }
    .edge  { stroke:#555; stroke-width:1.4; fill:none; marker-end:url(#arrow); }
    .lbl   { fill:#444; font-size:12px; }
    .title { font-weight:bold; }
    text   { fill:#1d2733; }
    .center{ text-anchor:middle; }
  </style>

  <!-- External actors -->
  <rect class="ext" x="90"  y="20" width="170" height="46" rx="8"/>
  <text class="center title" x="175" y="48">GitHub</text>

  <rect class="ext" x="670" y="20" width="170" height="46" rx="8"/>
  <text class="center title" x="755" y="48">ブラウザ</text>

  <!-- builder Pod -->
  <rect class="pod" x="60" y="120" width="380" height="450" rx="8"/>
  <text class="title" x="78" y="146">builder (Pod)</text>

  <rect class="sub" x="92" y="160" width="316" height="58" rx="6"/>
  <text class="center" x="250" y="184">API server</text>
  <text class="center lbl" x="250" y="202">gRPC + /webhook (HTTP)</text>

  <rect class="sub" x="92" y="234" width="316" height="52" rx="6"/>
  <text class="center" x="250" y="259">webhook Handler</text>
  <text class="center lbl" x="250" y="276">github_event へ INSERT</text>

  <rect class="sub" x="92" y="302" width="316" height="52" rx="6"/>
  <text class="center" x="250" y="327">Scheduler + Reconciler</text>
  <text class="center lbl" x="250" y="344">leader のみ稼働</text>

  <rect class="sub" x="92" y="370" width="316" height="52" rx="6"/>
  <text class="center" x="250" y="395">Coordinator</text>
  <text class="center lbl" x="250" y="412">BazelBuilder / JobWatcher</text>

  <rect class="sub" x="92" y="438" width="316" height="52" rx="6"/>
  <text class="center" x="250" y="463">git-data-service</text>
  <text class="center lbl" x="250" y="480">埋め込み 127.0.0.1:8056</text>

  <!-- bff Pod -->
  <rect class="pod" x="650" y="120" width="220" height="120" rx="8"/>
  <text class="title" x="668" y="146">bff (Pod)</text>
  <rect class="sub" x="676" y="160" width="168" height="58" rx="6"/>
  <text class="center" x="760" y="184">BFF service</text>
  <text class="center lbl" x="760" y="202">Connect → gRPC 集約</text>

  <!-- Kubernetes Job -->
  <rect class="job" x="600" y="330" width="290" height="150" rx="8"/>
  <text class="title" x="618" y="356">Kubernetes Job</text>
  <text x="618" y="384">init : clone / pre-process</text>
  <text x="618" y="410">main : bazel test|run</text>
  <text x="618" y="436">report : sidecar</text>
  <text class="lbl" x="618" y="462">(sidecar イメージ)</text>

  <!-- Storage row -->
  <rect class="store" x="60"  y="640" width="170" height="64" rx="8"/>
  <text class="center" x="145" y="668">MariaDB</text>
  <text class="center lbl" x="145" y="686">task / github_event 等</text>

  <rect class="store" x="250" y="640" width="160" height="64" rx="8"/>
  <text class="center" x="330" y="668">MinIO (logs)</text>
  <text class="center lbl" x="330" y="686">ビルドログ</text>

  <rect class="store" x="430" y="640" width="210" height="64" rx="8"/>
  <text class="center" x="535" y="668">MinIO (bazel mirror)</text>
  <text class="center lbl" x="535" y="686">+ remote cache</text>

  <rect class="store" x="700" y="640" width="170" height="64" rx="8"/>
  <text class="center" x="785" y="668">Vault</text>
  <text class="center lbl" x="785" y="686">ジョブのシークレット</text>

  <!-- Edges -->
  <!-- GitHub -> webhook -->
  <path class="edge" d="M175,66 L175,234"/>
  <text class="lbl" x="182" y="110">webhook</text>
  <text class="lbl" x="182" y="126">(proxy が署名検証)</text>

  <!-- Browser -> bff -->
  <path class="edge" d="M755,66 L755,120"/>
  <text class="lbl" x="762" y="98">Connect</text>

  <!-- bff -> API server -->
  <path class="edge" d="M676,182 L408,186"/>
  <text class="lbl" x="468" y="176">gRPC (API)</text>

  <!-- bff -> git-data-service -->
  <path class="edge" d="M672,210 Q470,300 408,452"/>
  <text class="lbl" x="500" y="318">gRPC (git-data)</text>

  <!-- Coordinator -> Kubernetes Job -->
  <path class="edge" d="M408,396 L600,400"/>
  <text class="lbl" x="470" y="388">Job 作成 / reconcile</text>

  <!-- builder -> MariaDB -->
  <path class="edge" d="M145,570 L145,640"/>
  <!-- builder -> MinIO logs -->
  <path class="edge" d="M300,570 L330,640"/>
  <!-- builder -> bazel mirror -->
  <path class="edge" d="M400,500 L520,640"/>
  <!-- builder -> Vault -->
  <path class="edge" d="M440,470 Q650,540 785,640"/>
</svg>
