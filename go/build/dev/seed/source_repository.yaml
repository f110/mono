# Seed for the build app's source_repository table.
#
# Mirrors the repositories that githubmock-seed.yaml serves through the
# GitHub API mock. The `private` flag follows the public/private convention
# encoded in each repository name.
- id: 1
  url: https://github.com/example/public-app
  clone_url: https://github.com/example/public-app.git
  name: example/public-app
  private: false
  status: 1
  default_branch: main
  created_at: 2026-01-01 00:00:00
- id: 2
  url: https://github.com/example/private-app
  clone_url: https://github.com/example/private-app.git
  name: example/private-app
  private: true
  status: 1
  default_branch: main
  created_at: 2026-01-01 00:00:00
