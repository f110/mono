syntax = "proto3";

package build.schema;

import "ddl.proto";
import "google/protobuf/timestamp.proto";

option go_package = "go.f110.dev/mono/go/build/database;database";

enum TestStatus {
  TEST_STATUS_PASSED = 0;
  TEST_STATUS_FLAKY  = 1;
  TEST_STATUS_FAILED = 2;
}

enum GithubEventState {
  GITHUB_EVENT_STATE_PENDING    = 0;
  GITHUB_EVENT_STATE_PROCESSING = 1;
  GITHUB_EVENT_STATE_SUCCEEDED  = 2;
  GITHUB_EVENT_STATE_FAILED     = 3;
  GITHUB_EVENT_STATE_EXPIRED    = 4;
  GITHUB_EVENT_STATE_SKIPPED    = 5;
}

message SourceRepository {
  int32  id             = 1 [(dev.f110.ddl.column) = { sequence: true }];
  string url            = 2;
  string clone_url      = 3;
  string name           = 4 [(dev.f110.ddl.column) = { size: 100 }];
  bool private          = 5;
  string default_branch = 7;
  // bazel_version mirrors the .bazelversion file at the tip of default_branch.
  // Refreshed by the push reconciler so InvokeJob does not need to fetch it
  // from GitHub.
  string bazel_version = 8;

  option (dev.f110.ddl.table) = {
    primary_key: "id"
    with_timestamp: true
  };

  option (dev.f110.ddl.dao) = {
    queries: {
      name: "All"
      query: "SELECT * FROM `:table_name:`"
    }
    queries: {
      name: "ByUrl"
      query: "SELECT * FROM `:table_name:` WHERE `url` = ?"
    }
  };
}

message Task {
  int32                      id                       = 1 [(dev.f110.ddl.column) = { sequence: true }];
  SourceRepository           repository               = 2;
  string                     job_name                 = 3;
  string                     job_configuration        = 4 [(dev.f110.ddl.column) = { type: "text", null: true }, deprecated = true];
  bytes                      parsed_job_configuration = 5;
  string                     revision                 = 6;
  bool                       is_trunk                 = 7;
  string                     bazel_version            = 8;
  bool                       success                  = 9;
  string                     log_file                 = 10;
  string                     command                  = 11;
  string                     target                   = 12 [deprecated = true];
  string                     targets                  = 13 [(dev.f110.ddl.column) = { type: "text" }];
  string                     platform                 = 14 [(dev.f110.ddl.column) = { type: "text" }];
  string                     via                      = 15;
  string                     config_name              = 16;
  string                     node                     = 17;
  string                     job_object_name          = 18;
  string                     manifest                 = 19 [(dev.f110.ddl.column) = { type: "text" }];
  string                     container                = 20;
  int32                      executed_tests_count     = 21;
  int32                      succeeded_tests_count    = 22;
  .google.protobuf.Timestamp start_at                 = 23 [(dev.f110.ddl.column) = { null: true }];
  .google.protobuf.Timestamp finished_at              = 24 [(dev.f110.ddl.column) = { null: true }];

  option (dev.f110.ddl.table) = {
    primary_key: "id"
    with_timestamp: true
    indexes: {
      name: "idx_repo"
      columns: "repository"
    }
  };

  option (dev.f110.ddl.dao) = {
    queries: {
      name: "All"
      query: "SELECT * FROM `:table_name:`"
    }
    queries: {
      name: "OffsetAll"
      query: "SELECT * FROM `:table_name:` WHERE `id` <= ?"
    }
    queries: {
      name: "ByRepositoryId"
      query: "SELECT * FROM `:table_name:` WHERE `repository_id` = ?"
    }
    queries: {
      name: "Pending"
      query: "SELECT * FROM `:table_name:` WHERE `start_at` IS NULL"
    }
    queries: {
      name: "UniqJobName"
      query: "SELECT DISTINCT `job_name` FROM `:table_name:` WHERE job_name != '' AND `repository_id` = ?"
    }
    queries: {
      name: "ByRevision"
      query: "SELECT * FROM `:table_name:` WHERE `repository_id` = ? AND `revision` = ?"
    }
  };
}

message TrustedUser {
  int32  id        = 1 [(dev.f110.ddl.column) = { sequence: true }];
  int64  github_id = 2;
  string username  = 3;

  option (dev.f110.ddl.table) = {
    primary_key: "id"
    with_timestamp: true
  };

  option (dev.f110.ddl.dao) = {
    queries: {
      name: "All"
      query: "SELECT * FROM `:table_name:`"
    }
    queries: {
      name: "ByGithubId"
      query: "SELECT * FROM `:table_name:` WHERE `github_id` = ?"
    }
  };
}

message PermitPullRequest {
  int32  id         = 1 [(dev.f110.ddl.column) = { sequence: true }];
  string repository = 2;
  int32  number     = 3;

  option (dev.f110.ddl.table) = {
    primary_key: "id"
    with_timestamp: true
  };

  option (dev.f110.ddl.dao) = {
    queries: {
      name: "ByRepositoryAndNumber"
      query: "SELECT * FROM `:table_name:` WHERE `repository` = ? AND `number` = ?"
    }
  };
}

message TestReport {
  int32                      id         = 1 [(dev.f110.ddl.column) = { sequence: true }];
  SourceRepository           repository = 2;
  Task                       task       = 3;
  string                     label      = 4;
  TestStatus                 status     = 5;
  int64                      duration   = 6;
  .google.protobuf.Timestamp start_at   = 7;

  option (dev.f110.ddl.table) = {
    primary_key: "id"
    indexes: {
      name: "idx_label"
      columns: "label"
    }
    indexes: {
      name: "idx_task_id"
      columns: "task"
    }
  };

  option (dev.f110.ddl.dao) = {
    queries: {
      name: "ByTaskId"
      query: "SELECT * FROM `:table_name:` WHERE `task_id` = ?"
    }
  };
}

// Job lists the manually-triggerable jobs (i.e. those whose Event includes
// EventManual) defined in the default branch of the source repository. Jobs
// that are not manually triggerable (push-only, external_release, etc.) are
// NOT stored here. The push reconciler refreshes this table whenever the
// default branch is updated so InvokeJob can dispatch a build without
// re-reading the cue files from GitHub.
//
// `configuration` is the JSON produced by config.MarshalJob for the matching
// JobV2; InvokeJob decodes it with config.UnmarshalJobV2.
message Job {
  SourceRepository repository    = 1;
  string           name          = 2;
  bytes            configuration = 3;

  option (dev.f110.ddl.table) = {
    primary_key: "repository"
    primary_key: "name"
  };

  option (dev.f110.ddl.dao) = {
    queries: {
      name: "ByRepositoryId"
      query: "SELECT * FROM `:table_name:` WHERE `repository_id` = ?"
    }
  };
}

// ExternalReleaseTrigger caches a job definition that subscribes to a third-party
// repository's release/tag stream. The cue file in the source repository is the
// source of truth; this table is reconciled on push and used as a fast index
// on startup.
message ExternalReleaseTrigger {
  int32            id                 = 1 [(dev.f110.ddl.column) = { sequence: true }];
  SourceRepository repository         = 2;
  string           job_name           = 3 [(dev.f110.ddl.column) = { size: 255 }];
  string           provider           = 4 [(dev.f110.ddl.column) = { size: 32 }];
  string           external_repo      = 5 [(dev.f110.ddl.column) = { size: 255 }];
  string           kind               = 6 [(dev.f110.ddl.column) = { size: 16 }];
  string           tag_pattern        = 7 [(dev.f110.ddl.column) = { size: 255 }];
  bool             include_prerelease = 8;

  option (dev.f110.ddl.table) = {
    primary_key: "id"
    with_timestamp: true
    indexes: {
      name: "uniq_repo_job"
      columns: "repository"
      columns: "job_name"
      unique: true
    }
    indexes: {
      name: "idx_external"
      columns: "provider"
      columns: "external_repo"
      columns: "kind"
    }
  };

  option (dev.f110.ddl.dao) = {
    queries: {
      name: "All"
      query: "SELECT * FROM `:table_name:`"
    }
    queries: {
      name: "ByRepositoryId"
      query: "SELECT * FROM `:table_name:` WHERE `repository_id` = ?"
    }
  };
}

// GithubEvent records a single webhook delivery from GitHub. The HTTP handler
// inserts a row with state=PENDING and returns 200 immediately; an asynchronous
// scheduler picks up PENDING/FAILED rows and dispatches them to a Reconciler
// keyed by event_type. The payload is stored raw so any GitHub webhook event
// type can be persisted without schema changes. The status column holds a
// per-event-type JSON document describing reconcile progress, allowing each
// Reconciler to be idempotent across restarts.
message GithubEvent {
  int32            id          = 1 [(dev.f110.ddl.column) = { sequence: true }];
  string           delivery_id = 2 [(dev.f110.ddl.column) = { size: 64 }];
  string           event_type  = 3 [(dev.f110.ddl.column) = { size: 64 }];
  string           action      = 4 [(dev.f110.ddl.column) = { size: 64 }];
  bytes            payload     = 5 [(dev.f110.ddl.column) = { type: "medium" }];
  GithubEventState state       = 6;
  bytes            status      = 7;
  string           last_error  = 8 [(dev.f110.ddl.column) = { type: "text" }];

  option (dev.f110.ddl.table) = {
    primary_key: "id"
    with_timestamp: true
    indexes: {
      name: "uniq_delivery_id"
      columns: "delivery_id"
      unique: true
    }
    indexes: {
      name: "idx_state"
      columns: "state"
    }
  };

  option (dev.f110.ddl.dao) = {
    queries: {
      name: "All"
      query: "SELECT * FROM `:table_name:`"
    }
    queries: {
      name: "ByDeliveryId"
      query: "SELECT * FROM `:table_name:` WHERE `delivery_id` = ?"
    }
    queries: {
      name: "ByState"
      query: "SELECT * FROM `:table_name:` WHERE `state` = ? ORDER BY `id`"
    }
  };
}

// ExternalReleaseHistory records each (trigger, tag) that has been observed and
// dispatched. The UNIQUE constraint guarantees idempotency across leader
// hand-off when in-memory polling state is lost.
message ExternalReleaseHistory {
  int32                      id            = 1 [(dev.f110.ddl.column) = { sequence: true }];
  SourceRepository           repository    = 2;
  string                     job_name      = 3 [(dev.f110.ddl.column) = { size: 255 }];
  string                     external_repo = 4 [(dev.f110.ddl.column) = { size: 255 }];
  string                     tag           = 5 [(dev.f110.ddl.column) = { size: 255 }];
  int32                      task_id       = 6;
  .google.protobuf.Timestamp processed_at  = 7;

  option (dev.f110.ddl.table) = {
    primary_key: "id"
    indexes: {
      name: "uniq_dispatch"
      columns: "repository"
      columns: "job_name"
      columns: "external_repo"
      columns: "tag"
      unique: true
    }
  };

  option (dev.f110.ddl.dao) = {
    queries: {
      name: "ByRepositoryAndJob"
      query: "SELECT * FROM `:table_name:` WHERE `repository_id` = ? AND `job_name` = ? ORDER BY `id` DESC"
    }
    queries: {
      name: "Processed"
      query: "SELECT * FROM `:table_name:` WHERE `repository_id` = ? AND `job_name` = ? AND `external_repo` = ? AND `tag` = ?"
    }
  };
}
