edition = "2023";

package mono.build.model;

import "google/protobuf/go_features.proto";
import "google/protobuf/timestamp.proto";

option features.(pb.go).api_level = API_OPAQUE;
option go_package                 = "go.f110.dev/mono/go/build/model";

enum RepositoryStatus {
  REPOSITORY_STATUS_UNKNOWN              = 0;
  REPOSITORY_STATUS_READY                = 1;
  REPOSITORY_STATUS_INVALID_BUILD_CONFIG = 2;
}

enum TestStatus {
  TEST_STATUS_PASSED = 0;
  TEST_STATUS_FLAKY  = 1;
  TEST_STATUS_FAILED = 2;
}

message Repository {
  int32  id               = 1;
  string name             = 2;
  string url              = 3;
  string clone_url        = 4;
  bool private            = 5;
  RepositoryStatus status = 6;
  // Full commit SHA at the tip of default_branch. Populated only when the API
  // server has access to git-data-service; empty otherwise. Clients shorten
  // this for display.
  string head_revision = 7;
}

message Task {
  int32                     id                       = 1;
  int32                     repository_id            = 2;
  string                    job_name                 = 3;
  string                    parsed_job_configuration = 4;
  string                    revision                 = 5;
  string                    bazel_version            = 6;
  string                    command                  = 7;
  bool                      is_trunk                 = 8;
  bool                      success                  = 9;
  string                    log_file                 = 10;
  repeated string           targets                  = 11;
  string                    platform                 = 12;
  string                    via                      = 13;
  string                    config_name              = 14;
  string                    node                     = 15;
  string                    manifest                 = 16;
  string                    container                = 17;
  int32                     executed_tests_count     = 18;
  int32                     succeeded_tests_count    = 19;
  google.protobuf.Timestamp start_at                 = 20;
  google.protobuf.Timestamp finished_at              = 21;
  google.protobuf.Timestamp created_at               = 22;
  google.protobuf.Timestamp updated_at               = 23;
  string                    repository_url           = 24;
  string                    revision_url             = 25;
  string                    cpu_limit                = 26;
  string                    memory_limit             = 27;
  repeated TestReport       test_reports             = 28;
}

message Job {
  string name          = 1;
  int32  repository_id = 2;
}

message TestReport {
  string     label    = 1;
  TestStatus status   = 2;
  int64      duration = 3;
}

// GithubEvent surfaces a row from the `github_event` table for the dashboard.
// The `state` field carries the proto enum name ("PENDING", "SUCCEEDED", …)
// so the frontend does not have to know the numeric mapping. `status` is the
// reconciler's progress JSON serialized as a string — the dashboard renders
// it raw, since the document's shape depends on event_type.
message GithubEvent {
  int32                     id          = 1;
  string                    delivery_id = 2;
  string                    event_type  = 3;
  string                    action      = 4;
  string                    state       = 5;
  string                    status      = 6;
  string                    last_error  = 7;
  google.protobuf.Timestamp created_at  = 8;
  google.protobuf.Timestamp updated_at  = 9;
  // Repository is the full_name (e.g. "owner/repo") parsed out of the
  // webhook payload at read time. Empty when the payload has no
  // repository field or is malformed.
  string repository     = 10;
  string repository_url = 11;
}

message ExternalReleaseTrigger {
  int32  id                 = 1;
  int32  repository_id      = 2;
  string repository_name    = 3;
  string repository_url     = 4;
  string job_name           = 5;
  string provider           = 6;
  string external_repo      = 7;
  string external_repo_url  = 8;
  string kind               = 9;
  string tag_pattern        = 10;
  bool   include_prerelease = 11;
}
