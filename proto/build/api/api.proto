edition = "2023";

package mono.build.api;

import "google/protobuf/go_features.proto";
import "proto/build/model/msg.proto";

option features.(pb.go).api_level = API_OPAQUE;
option go_package                 = "go.f110.dev/mono/go/build/api";

service API {
  rpc ListTasks(RequestListTasks) returns (ResponseListTasks);
  rpc ListRepositories(RequestListRepositories) returns (ResponseListRepositories);
  rpc SaveRepository(RequestSaveRepository) returns (ResponseSaveRepository);
  rpc DeleteRepository(RequestDeleteRepository) returns (ResponseDeleteRepository);
  rpc ListJobs(RequestListJobs) returns (ResponseListJobs);
  rpc InvokeJob(RequestInvokeJob) returns (ResponseInvokeJob);
  rpc ForceStopTask(RequestForceStopTask) returns (ResponseForceStopTask);
  rpc GetServerInfo(RequestGetServerInfo) returns (ResponseGetServerInfo);
  rpc ListExternalReleaseTriggers(RequestListExternalReleaseTriggers) returns (ResponseListExternalReleaseTriggers);
  rpc ListGithubEvents(RequestListGithubEvents) returns (ResponseListGithubEvents);
}

message RequestListTasks {
  repeated int32 ids            = 1;
  repeated int32 repository_ids = 2;

  int32  page_size  = 3;
  string page_token = 4;
}

message ResponseListTasks {
  repeated mono.build.model.Task tasks = 1;

  string next_page_token = 2;
}

message RequestListRepositories {
  repeated int32 ids = 1;
}

message ResponseListRepositories {
  repeated mono.build.model.Repository repositories = 1;
}

message RequestSaveRepository {
  mono.build.model.Repository repository = 1;
}

message ResponseSaveRepository {
  mono.build.model.Repository repository = 1;
}

message RequestDeleteRepository {
  int32 repository_id = 1;
}

message ResponseDeleteRepository {
}

message RequestListJobs {
  int32 repository_id = 1;
}

message ResponseListJobs {
  repeated mono.build.model.Job jobs = 1;
}

message RequestInvokeJob {
  int32  task_id       = 1;
  int32  repository_id = 2;
  string job_name      = 3;
}

message ResponseInvokeJob {
  int32 task_id = 1;
}

message RequestForceStopTask {
  int32 task_id = 1;
}

message ResponseForceStopTask {}

message RequestGetServerInfo {}

message ResponseGetServerInfo {
  repeated string supported_bazel_versions = 1;
  string          schema_version           = 2;
  ServerConfig    config                   = 3;
}

// ServerConfig is a curated, human-meaningful view of the builder's runtime
// configuration shown on the info page. It intentionally omits secrets
// (credentials, tokens, DSN). Durations are pre-formatted strings.
message ServerConfig {
  bool dev                              = 1;  // development mode (no kube-apiserver integration)
  bool leader_election                  = 2;
  string namespace                      = 3;
  bool   use_bazelisk                   = 4;
  string default_bazel_version          = 5;
  string remote_cache                   = 6;
  string task_cpu_limit                 = 7;
  string task_memory_limit              = 8;
  bool   gc_enabled                     = 9;
  string git_data_service_listen        = 10;  // listen addr of the embedded git-data-service
  string git_data_service_url           = 11;  // URL of an external git-data-service
  string git_data_refresh_interval      = 12;
  int32  git_data_refresh_workers       = 13;
  string external_release_poll_interval = 14;
  string event_reconcile_interval       = 15;
  int64  github_app_id                  = 16;
  string vault_addr                     = 17;
  string dashboard_url                  = 18;
  // The following fields expose the runtime configuration required to render a
  // runnable Job manifest (e.g. by buildctl jobs manifest). They are not secrets.
  string bazel_image                 = 19;
  string sidecar_image               = 20;
  string bazel_mirror_url            = 21;
  string central_registry_mirror_url = 22;
  bool   remote_asset_api            = 23;
  bool   pull_always                 = 24;
  int64  github_installation_id      = 25;
  string github_app_secret_name      = 26;
}

message RequestListExternalReleaseTriggers {
  int32 repository_id = 1;
}

message ResponseListExternalReleaseTriggers {
  repeated mono.build.model.ExternalReleaseTrigger triggers = 1;
}

message RequestListGithubEvents {
  int32 event_id = 1;
}

message ResponseListGithubEvents {
  repeated mono.build.model.GithubEvent events = 1;
}
